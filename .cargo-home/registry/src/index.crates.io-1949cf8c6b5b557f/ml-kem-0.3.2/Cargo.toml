[package]
edition = "2024"
rust-version = "1.85"
name = "ml-kem"
version = "0.3.2"
build = false
exclude = [
    "tests/key-gen.rs",
    "tests/key-gen.json",
    "tests/encap-decap.rs",
    "tests/encap-decap.json",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = """
Pure Rust implementation of the Module-Lattice-Based Key-Encapsulation Mechanism Standard
(formerly known as Kyber) as described in FIPS 203
"""
homepage = "https://github.com/RustCrypto/KEMs/tree/master/ml-kem"
readme = "README.md"
keywords = [
    "crypto",
    "kyber",
    "lattice",
    "post-quantum",
]
categories = [
    "cryptography",
    "no-std",
]
license = "Apache-2.0 OR MIT"
repository = "https://github.com/RustCrypto/KEMs"
resolver = "2"

[package.metadata.docs.rs]
all-features = true

[features]
alloc = [
    "module-lattice/alloc",
    "pkcs8?/alloc",
]
default = ["alloc"]
getrandom = ["kem/getrandom"]
hazmat = []
pem = ["pkcs8/pem"]
pkcs8 = [
    "dep:const-oid",
    "dep:pkcs8",
]
zeroize = [
    "module-lattice/zeroize",
    "dep:zeroize",
]

[lib]
name = "ml_kem"
path = "src/lib.rs"

[[test]]
name = "pkcs8"
path = "tests/pkcs8.rs"

[[test]]
name = "wycheproof"
path = "tests/wycheproof.rs"

[[bench]]
name = "mlkem"
path = "benches/mlkem.rs"
harness = false

[dependencies.array]
version = "0.4.8"
features = [
    "ctutils",
    "extra-sizes",
]
package = "hybrid-array"

[dependencies.const-oid]
version = "0.10.1"
features = ["db"]
optional = true
default-features = false

[dependencies.kem]
version = "0.3"

[dependencies.module-lattice]
version = "0.2.3"
features = ["ctutils"]

[dependencies.pkcs8]
version = "0.11"
optional = true
default-features = false

[dependencies.rand_core]
version = "0.10"

[dependencies.sha3]
version = "0.11"
default-features = false

[dependencies.zeroize]
version = "1.8.1"
optional = true
default-features = false

[dev-dependencies.criterion]
version = "0.7"

[dev-dependencies.getrandom]
version = "0.4"
features = ["sys_rng"]

[dev-dependencies.hex]
version = "0.4.3"
features = ["serde"]

[dev-dependencies.hex-literal]
version = "1"

[dev-dependencies.num-rational]
version = "0.4.2"
features = ["num-bigint"]
default-features = false

[dev-dependencies.serde]
version = "1.0.208"
features = ["derive"]

[dev-dependencies.serde_json]
version = "1.0.125"

